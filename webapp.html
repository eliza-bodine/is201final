<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Web App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    function MarathonTrainingPlanner() {
      const { useMemo, useState } = React;

      const [name, setName] = useState("Runner");
      const [weeks, setWeeks] = useState(12);
      const [experience, setExperience] = useState("beginner");
      const [goal, setGoal] = useState("finish");
      const [days, setDays] = useState(4);
      const [raceDate, setRaceDate] = useState("");

      const palettes = {
        beginner: {
          badge: "Fresh Start",
          accent: "from-pink-300 via-rose-200 to-amber-200",
          card: "from-white/95 to-pink-50/85",
          text: "text-rose-900",
          chip: "bg-pink-100 text-rose-700 border-pink-200",
          glow: "shadow-[0_20px_60px_rgba(251,207,232,0.35)]",
        },
        intermediate: {
          badge: "Steady Growth",
          accent: "from-rose-300 via-pink-200 to-yellow-200",
          card: "from-white/95 to-rose-50/85",
          text: "text-rose-900",
          chip: "bg-rose-100 text-rose-700 border-rose-200",
          glow: "shadow-[0_20px_60px_rgba(244,114,182,0.22)]",
        },
        advanced: {
          badge: "Peak Form",
          accent: "from-fuchsia-300 via-rose-200 to-amber-200",
          card: "from-white/95 to-pink-50/85",
          text: "text-rose-900",
          chip: "bg-pink-100 text-rose-700 border-pink-200",
          glow: "shadow-[0_20px_60px_rgba(251,113,133,0.22)]",
        },
      };

      const palette = palettes[experience];

      const longRunBase = {
        beginner: [6, 8, 10, 8, 12, 14, 12, 16, 18, 16, 20, 22],
        intermediate: [8, 10, 12, 10, 14, 16, 14, 18, 20, 18, 20, 22],
        advanced: [10, 12, 14, 12, 16, 18, 16, 20, 22, 20, 21, 22],
      };

      const midweekBase = {
        beginner: [3, 3, 4, 3, 4, 5, 4, 5, 5, 4, 5, 3],
        intermediate: [4, 5, 5, 4, 6, 6, 5, 7, 7, 5, 6, 4],
        advanced: [5, 6, 6, 5, 7, 8, 6, 8, 9, 7, 8, 5],
      };

      const goalAdjustment = {
        finish: { note: "Focus on consistency, confidence, and finishing strong." },
        improve: { note: "Build endurance with controlled effort and steady progression." },
        compete: { note: "Add stronger quality sessions to sharpen speed and stamina." },
      };

      const workoutLibrary = {
        beginner: {
          finish: [
            "Run-walk workout",
            "Gentle tempo run",
            "Easy progression run",
            "Short hill sprints",
            "Steady-state run",
            "Tempo run",
            "Intervals",
            "Cruise tempo",
            "Hill repeats",
            "Tempo run",
            "Race-pace workout",
            "Light shakeout workout",
          ],
          improve: [
            "Tempo run",
            "Progression run",
            "Hill sprints",
            "Cruise intervals",
            "Tempo run",
            "Fartlek workout",
            "Steady-state run",
            "Mile repeats",
            "Tempo run",
            "Intervals",
            "Race-pace workout",
            "Light tempo run",
          ],
          compete: [
            "Tempo run",
            "Hill sprints",
            "Intervals",
            "Cruise intervals",
            "Mile repeats",
            "Tempo run",
            "Hill repeats",
            "Intervals",
            "Mile repeats",
            "Tempo run",
            "Race-pace workout",
            "Light sharpening workout",
          ],
        },
        intermediate: {
          finish: [
            "Gentle tempo run",
            "Progression run",
            "Hill sprints",
            "Cruise tempo",
            "Tempo run",
            "Intervals",
            "Steady-state run",
            "Mile repeats",
            "Tempo run",
            "Intervals",
            "Race-pace workout",
            "Light shakeout workout",
          ],
          improve: [
            "Tempo run",
            "Hill sprints",
            "Intervals",
            "Cruise tempo",
            "Mile repeats",
            "Tempo run",
            "Hill repeats",
            "Intervals",
            "Tempo run",
            "Mile repeats",
            "Race-pace workout",
            "Light tempo run",
          ],
          compete: [
            "Tempo run",
            "Mile repeats",
            "Hill sprints",
            "Intervals",
            "Cruise intervals",
            "Tempo run",
            "Hill repeats",
            "Mile repeats",
            "Intervals",
            "Tempo run",
            "Race-pace workout",
            "Light sharpening workout",
          ],
        },
        advanced: {
          finish: [
            "Tempo run",
            "Progression run",
            "Hill sprints",
            "Cruise tempo",
            "Mile repeats",
            "Tempo run",
            "Intervals",
            "Hill repeats",
            "Tempo run",
            "Mile repeats",
            "Race-pace workout",
            "Light sharpening workout",
          ],
          improve: [
            "Tempo run",
            "Mile repeats",
            "Hill sprints",
            "Intervals",
            "Cruise tempo",
            "Tempo run",
            "Hill repeats",
            "Intervals",
            "Mile repeats",
            "Tempo run",
            "Race-pace workout",
            "Light sharpening workout",
          ],
          compete: [
            "Tempo run",
            "Mile repeats",
            "Hill sprints",
            "Intervals",
            "Cruise intervals",
            "Tempo run",
            "Hill repeats",
            "Mile repeats",
            "Intervals",
            "Tempo run",
            "Race-pace workout",
            "Taper sharpening workout",
          ],
        },
      };

      const quoteBank = [
        "You did not come this far to only come this far.",
        "Strong girls run long miles.",
        "Progress is built one run at a time.",
        "Run with heart, finish with confidence.",
      ];

      const fuelTips = [
        "Practice fueling on long runs so race day feels familiar.",
        "Hydrate early instead of waiting until you feel behind.",
        "Test your gels before race week, not during it.",
        "Pair long runs with recovery snacks soon after you finish.",
      ];

      const countdownText = useMemo(() => {
        if (!raceDate) return "Pick a race date to see your countdown.";
        const today = new Date();
        const target = new Date(`${raceDate}T00:00:00`);
        const todayOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());
        const diff = Math.ceil((target - todayOnly) / (1000 * 60 * 60 * 24));

        if (diff > 1) return `Race day in ${diff} days.`;
        if (diff === 1) return "Race day is tomorrow.";
        if (diff === 0) return "Race day is today.";
        return "That race date has already passed.";
      }, [raceDate]);

      const plan = useMemo(() => {
        const longRuns = longRunBase[experience].slice(0, weeks);
        const midweek = midweekBase[experience].slice(0, weeks);
        const workouts = workoutLibrary[experience][goal].slice(0, weeks);

        return Array.from({ length: weeks }, (_, i) => {
          const weekNum = i + 1;
          const longRun = longRuns[i] ?? longRuns[longRuns.length - 1];
          const baseMid = midweek[i] ?? midweek[midweek.length - 1];
          const easy1 = Math.max(2, baseMid - 1);
          const easy2 = Math.max(2, baseMid);
          const workoutType = workouts[i] ?? workouts[workouts.length - 1];
          const workoutMiles = goal === "finish" ? baseMid : goal === "improve" ? baseMid + 1 : baseMid + 2;

          const workoutDetailsMap = {
            "Run-walk workout": `${workoutMiles} miles total with short run-walk intervals to build comfort`,
            "Gentle tempo run": `${workoutMiles} miles total with 10-15 minutes at comfortably hard effort`,
            "Easy progression run": `${workoutMiles} miles starting easy and finishing a little stronger`,
            "Short hill sprints": `${workoutMiles} miles total including 6-8 short hill sprints`,
            "Hill sprints": `${workoutMiles} miles total including 6-8 short hill sprints`,
            "Steady-state run": `${workoutMiles} miles at smooth, steady effort`,
            "Tempo run": `${workoutMiles} miles total with sustained tempo effort`,
            "Intervals": `${workoutMiles} miles total including short fast intervals with recovery jogs`,
            "Cruise tempo": `${workoutMiles} miles total with controlled tempo segments`,
            "Hill repeats": `${workoutMiles} miles total including repeat climbs on a moderate hill`,
            "Progression run": `${workoutMiles} miles building pace gradually through the run`,
            "Cruise intervals": `${workoutMiles} miles total with longer aerobic intervals and short recovery`,
            "Fartlek workout": `${workoutMiles} miles alternating faster surges and easy recovery`,
            "Mile repeats": `${workoutMiles} miles total including repeat mile efforts at strong pace`,
            "Race-pace workout": `${workoutMiles} miles total with sections at goal marathon pace`,
            "Light shakeout workout": `${Math.max(2, workoutMiles - 1)} easy miles with a few relaxed strides`,
            "Light tempo run": `${Math.max(2, workoutMiles - 1)} miles with a short controlled tempo section`,
            "Light sharpening workout": `${Math.max(2, workoutMiles - 1)} miles with a few quick pickups`,
            "Taper sharpening workout": `${Math.max(2, workoutMiles - 1)} miles easy with a few fast strides`,
          };

          let schedule = [
            { day: "Mon", type: "Optional Recovery", details: "Walk, stretch, or light mobility" },
            { day: "Tue", type: "Easy Run", details: `${easy1} miles at conversational pace` },
            { day: "Wed", type: workoutType, details: workoutDetailsMap[workoutType] || `${workoutMiles} miles total with quality effort` },
            { day: "Thu", type: "Recovery Run", details: `${Math.max(2, easy2 - 1)} miles very easy` },
            { day: "Fri", type: "Easy Run", details: `${easy2} miles relaxed` },
            { day: "Sat", type: "Long Run", details: `${longRun} miles` },
            { day: "Sun", type: "Rest Day", details: "Full rest and reset for the next week" },
          ];

          if (days === 3) {
            schedule = schedule.map((item) =>
              item.day === "Mon"
                ? { day: "Mon", type: "Rest / Mobility", details: "Stretch, foam roll, or gentle walk" }
                : item.day === "Thu"
                ? { day: "Thu", type: "Rest Day", details: "Take the day off or do light mobility" }
                : item.day === "Fri"
                ? { day: "Fri", type: "Rest Day", details: "Save energy for your long run" }
                : item
            );
          } else if (days === 4) {
            schedule = schedule.map((item) =>
              item.day === "Mon"
                ? { day: "Mon", type: "Rest / Mobility", details: "Stretch, walk, or foam roll" }
                : item
            );
          } else if (days === 5 || days === 6) {
            schedule = schedule.map((item) =>
              item.day === "Mon"
                ? { day: "Mon", type: "Short Easy Run", details: `${Math.max(2, easy1)} miles easy` }
                : item
            );
          }

          const weeklyMileage = schedule.reduce((sum, item) => {
            const match = item.details.match(/(\d+)/);
            return sum + (match ? Number(match[1]) : 0);
          }, 0);

          const previousLongRun = i > 0 ? longRuns[i - 1] : longRun;

          return {
            weekNum,
            focus:
              longRun === 22
                ? "Peak Week"
                : weekNum === weeks
                ? "Taper Week"
                : weekNum % 4 === 0
                ? "Recovery + Absorb Training"
                : weekNum % 3 === 0
                ? "Endurance Build"
                : "Base Building",
            longRun,
            weeklyMileage,
            note: goalAdjustment[goal].note,
            quote: quoteBank[i % quoteBank.length],
            fuelTip: fuelTips[i % fuelTips.length],
            caution: i > 0 && longRun - previousLongRun >= 4 ? "Mileage jumps more this week. Listen to your body and adjust if needed." : null,
            schedule,
          };
        });
      }, [experience, weeks, goal, days]);

      const totalMiles = plan.reduce((sum, week) => sum + week.weeklyMileage, 0);
      const peakLongRun = Math.max(...plan.map((w) => w.longRun));

      return (
        <div className="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(255,255,255,1),_rgba(255,241,242,0.96),_rgba(254,252,232,0.85),_rgba(255,255,255,1))] text-slate-800">
          <div className="mx-auto max-w-7xl px-6 py-10 md:px-10 lg:px-12">
            <div className="mb-8 grid gap-6 lg:grid-cols-[1.05fr_1.4fr]">
              <div className={`rounded-[2rem] bg-gradient-to-br ${palette.card} border border-white/90 p-7 shadow-[0_18px_50px_rgba(0,0,0,0.06)] backdrop-blur`}>
                <div className="mb-5 flex items-center justify-between gap-3">
                  <div>
                    <p className="text-sm font-medium uppercase tracking-[0.3em] text-rose-400">Marathon planner</p>
                    <h1 className={`mt-2 text-3xl font-semibold ${palette.text}`}>Marathon Glow Planner</h1>
                  </div>
                  <span className={`rounded-full border px-3 py-1 text-xs font-semibold ${palette.chip}`}>{palette.badge}</span>
                </div>

                <p className="mb-6 max-w-xl text-sm leading-6 text-rose-700/90">
                  This app builds a personalized marathon training plan based on your experience level, goal, number of training weeks, and how many days per week you want to run.
                </p>

                <div className="grid gap-4 sm:grid-cols-2">
                  <label className="space-y-2">
                    <span className="text-sm font-medium text-rose-800">Runner name</span>
                    <input
                      value={name}
                      onChange={(e) => setName(e.target.value)}
                      className="w-full rounded-2xl border border-white bg-white/90 px-4 py-3 outline-none ring-0 transition focus:border-rose-200"
                      placeholder="Runner"
                    />
                  </label>

                  <label className="space-y-2">
                    <span className="text-sm font-medium text-rose-800">Training weeks</span>
                    <select
                      value={weeks}
                      onChange={(e) => setWeeks(Number(e.target.value))}
                      className="w-full rounded-2xl border border-white bg-white/90 px-4 py-3 outline-none"
                    >
                      <option value={8}>8 weeks</option>
                      <option value={10}>10 weeks</option>
                      <option value={12}>12 weeks</option>
                    </select>
                  </label>

                  <label className="space-y-2">
                    <span className="text-sm font-medium text-rose-800">Experience level</span>
                    <select
                      value={experience}
                      onChange={(e) => setExperience(e.target.value)}
                      className="w-full rounded-2xl border border-white bg-white/90 px-4 py-3 outline-none"
                    >
                      <option value="beginner">Beginner</option>
                      <option value="intermediate">Intermediate</option>
                      <option value="advanced">Advanced</option>
                    </select>
                  </label>

                  <label className="space-y-2">
                    <span className="text-sm font-medium text-rose-800">Primary goal</span>
                    <select
                      value={goal}
                      onChange={(e) => setGoal(e.target.value)}
                      className="w-full rounded-2xl border border-white bg-white/90 px-4 py-3 outline-none"
                    >
                      <option value="finish">Finish strong</option>
                      <option value="improve">Improve endurance</option>
                      <option value="compete">Race competitively</option>
                    </select>
                  </label>

                  <label className="space-y-2 sm:col-span-2">
                    <span className="text-sm font-medium text-rose-800">Race date</span>
                    <input
                      type="date"
                      value={raceDate}
                      onChange={(e) => setRaceDate(e.target.value)}
                      className="w-full rounded-2xl border border-white bg-white/90 px-4 py-3 outline-none ring-0 transition focus:border-rose-200"
                    />
                  </label>

                  <label className="space-y-2 sm:col-span-2">
                    <span className="text-sm font-medium text-rose-800">Running days per week</span>
                    <div className="grid grid-cols-4 gap-3">
                      {[3, 4, 5, 6].map((option) => (
                        <button
                          key={option}
                          type="button"
                          onClick={() => setDays(option)}
                          className={`rounded-2xl border px-4 py-3 text-sm font-medium transition hover:scale-[1.01] ${
                            days === option
                              ? `bg-gradient-to-r ${palette.accent} text-rose-900 shadow-lg`
                              : "bg-white/90 text-rose-700"
                          }`}
                        >
                          {option} days
                        </button>
                      ))}
                    </div>
                  </label>
                </div>
              </div>

              <div className={`relative overflow-hidden rounded-[2rem] bg-gradient-to-br ${palette.accent} p-[1px] ${palette.glow}`}>
                <div className="h-full rounded-[2rem] bg-white/40 p-7 text-slate-900 backdrop-blur-xl">
                  <div className="flex flex-wrap items-start justify-between gap-4">
                    <div>
                      <p className="text-sm uppercase tracking-[0.35em] text-rose-400">overview</p>
                      <h2 className="mt-2 text-3xl font-semibold text-rose-900">{name || "Runner"}'s marathon block</h2>
                      <p className="mt-3 max-w-xl text-sm leading-6 text-rose-800/85">
                        A personalized build with long runs, speed sessions, recovery days, and a realistic path to a 22-mile peak long run.
                      </p>
                    </div>
                    <div className="rounded-2xl border border-white/70 bg-white/55 px-4 py-3 text-right backdrop-blur">
                      <p className="text-xs uppercase tracking-[0.25em] text-rose-400">Peak long run</p>
                      <p className="mt-1 text-2xl font-semibold text-rose-900">{peakLongRun} mi</p>
                    </div>
                  </div>

                  <div className="mt-8 grid gap-4 sm:grid-cols-3">
                    <div className="rounded-2xl border border-white/70 bg-white/45 p-5">
                      <p className="text-xs uppercase tracking-[0.25em] text-rose-400">Plan length</p>
                      <p className="mt-2 text-2xl font-semibold text-rose-900">{weeks} weeks</p>
                    </div>
                    <div className="rounded-2xl border border-white/70 bg-white/45 p-5">
                      <p className="text-xs uppercase tracking-[0.25em] text-rose-400">Running days</p>
                      <p className="mt-2 text-2xl font-semibold text-rose-900">{days}/week</p>
                    </div>
                    <div className="rounded-2xl border border-white/70 bg-white/45 p-5">
                      <p className="text-xs uppercase tracking-[0.25em] text-rose-400">Estimated total</p>
                      <p className="mt-2 text-2xl font-semibold text-rose-900">{totalMiles} mi</p>
                    </div>
                  </div>

                  <div className="mt-6 rounded-2xl border border-white/70 bg-white/55 p-4 backdrop-blur">
                    <p className="text-xs uppercase tracking-[0.25em] text-rose-400">Race countdown</p>
                    <p className="mt-2 text-lg font-semibold text-rose-900">{countdownText}</p>
                  </div>

                  <div className="mt-4 rounded-2xl border border-white/70 bg-white/55 p-4 backdrop-blur">
                    <p className="text-xs uppercase tracking-[0.25em] text-rose-400">Motivation</p>
                    <p className="mt-2 text-lg font-semibold text-rose-900">{quoteBank[0]}</p>
                  </div>

                  <div className="mt-8">
                    <div className="mb-3 flex items-center justify-between text-sm text-rose-800/90">
                      <span>Training progression</span>
                      <span>{Math.min(100, Math.round((peakLongRun / 26.2) * 100))}% of marathon distance</span>
                    </div>
                    <div className="h-4 overflow-hidden rounded-full bg-white/50">
                      <div
                        className={`h-full rounded-full bg-gradient-to-r ${palette.accent} shadow-sm`}
                        style={{ width: `${Math.min(100, Math.round((peakLongRun / 26.2) * 100))}%` }}
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div className="mb-5 flex items-end justify-between gap-4">
              <div>
                <p className="text-sm uppercase tracking-[0.3em] text-rose-400">weekly plan</p>
                <h3 className="mt-2 text-2xl font-semibold text-rose-900">Your generated schedule</h3>
              </div>
              <p className="max-w-md text-right text-sm text-rose-800/85">
                Sunday is always reserved as a full rest day, every fourth week backs off a little for recovery, and the plan builds toward a 22-mile peak week.
              </p>
            </div>

            <div className="grid gap-5 xl:grid-cols-2">
              {plan.map((week) => (
                <div
                  key={week.weekNum}
                  className={`rounded-[2rem] border border-white/90 p-6 backdrop-blur ${
                    week.longRun === 22
                      ? "bg-gradient-to-br from-white via-rose-50/95 to-amber-50/90 shadow-[0_18px_45px_rgba(251,113,133,0.12)]"
                      : "bg-white/85 shadow-[0_12px_35px_rgba(0,0,0,0.04)]"
                  }`}
                >
                  <div className="flex flex-wrap items-start justify-between gap-3">
                    <div>
                      <p className="text-sm uppercase tracking-[0.25em] text-rose-400">Week {week.weekNum}</p>
                      <h4 className="mt-1 text-xl font-semibold text-rose-900">{week.focus}</h4>
                    </div>
                    <div className="flex flex-wrap gap-2">
                      <div className={`rounded-full border px-3 py-1 text-xs font-semibold ${palette.chip}`}>
                        {week.weeklyMileage} total miles
                      </div>
                      {week.longRun === 22 && (
                        <div className="rounded-full border border-amber-200 bg-amber-50 px-3 py-1 text-xs font-semibold text-amber-700">
                          Peak Week
                        </div>
                      )}
                    </div>
                  </div>

                  <p className="mt-3 text-sm leading-6 text-rose-800/85">{week.note}</p>

                  <div className="mt-4 rounded-2xl bg-gradient-to-r from-pink-50 to-amber-50 px-4 py-3">
                    <p className="text-xs uppercase tracking-[0.2em] text-rose-400">Quote of the week</p>
                    <p className="mt-1 text-sm font-medium text-rose-800">{week.quote}</p>
                  </div>

                  <div className="mt-3 rounded-2xl bg-white/80 px-4 py-3">
                    <p className="text-xs uppercase tracking-[0.2em] text-rose-400">Fuel tip</p>
                    <p className="mt-1 text-sm text-rose-800">{week.fuelTip}</p>
                  </div>

                  {week.caution && (
                    <div className="mt-3 rounded-2xl border border-amber-200 bg-amber-50 px-4 py-3">
                      <p className="text-xs uppercase tracking-[0.2em] text-amber-700">Mileage note</p>
                      <p className="mt-1 text-sm text-amber-800">{week.caution}</p>
                    </div>
                  )}

                  <div className="mt-5 space-y-3">
                    {week.schedule.map((item) => (
                      <div key={`${week.weekNum}-${item.day}`} className="flex items-start gap-3 rounded-2xl bg-gradient-to-r from-white to-rose-50/70 px-4 py-3">
                        <div className={`mt-0.5 rounded-xl bg-gradient-to-r ${palette.accent} px-3 py-1 text-xs font-semibold text-rose-900`}>
                          {item.day}
                        </div>
                        <div>
                          <p className="font-medium text-rose-900">{item.type}</p>
                          <p className="text-sm text-rose-700/90">{item.details}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<MarathonTrainingPlanner />);
  </script>
</body>

</html>
